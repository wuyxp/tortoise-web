name: SSL cert expiry check

# 议题: MEETING-2026-05-11-06-docs-isolation Phase B (P0-2)
#       MEETING-2026-06-24-01: 改探【源站】证书, 不再探 serpilo.com 公网
# Weekly cron — openssl s_client 直连【源站, IP 见 secret ALIYUN_HOST】解析 cert 到期日, <30 天自动开 Issue
# 防 acme.sh 续期失败时静默, cert 过期 → (ESA 开了源站证书校验) 回源 502 挂站.
#
# ⚠️ 为什么探源站 IP 而不是 serpilo.com:
#   NS 已迁 ESA, serpilo.com:443 现在打到 ESA 边缘 → 返回的是 ESA 边缘证书 (自动续期、
#   永远新鲜) → 探它永远看不到会过期的那张【源站】Let's Encrypt 证书. 必须直连源站 IP.
# ⚠️ 已知后续 (源站防护 H 上线后): ECS:443 只放行 ESA 回源 IP → GitHub runner 直连会被挡,
#   本探测会失败. 届时需把监控改到 ECS 本地 cron, 或加站点健康(502)检查. 见 MEETING-2026-06-24-01 待办.

on:
  schedule:
    - cron: '0 8 * * 1'  # 每周一 08:00 UTC (北京 16:00)
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check:
    name: Check cert expiry
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Probe cert + parse expiry
        id: probe
        env:
          ORIGIN_HOST: ${{ secrets.ALIYUN_HOST }}   # 源站 IP/主机, 不在公开文件硬编码 (复用 deploy.yml 的 secret)
        run: |
          set -e
          DOMAIN="serpilo.com"
          ORIGIN_IP="$ORIGIN_HOST"   # 直连源站, SNI 带 DOMAIN; 探会过期的源站证书 (非 ESA 边缘证书)
          if [ -z "$ORIGIN_IP" ]; then echo "ERROR: secret ALIYUN_HOST 未设"; exit 1; fi

          # openssl s_client 直连源站 IP 拉 cert 链, openssl x509 解 enddate
          EXPIRY=$(echo | openssl s_client -servername "$DOMAIN" -connect "$ORIGIN_IP:443" 2>/dev/null \
            | openssl x509 -noout -enddate 2>/dev/null \
            | cut -d= -f2)

          if [ -z "$EXPIRY" ]; then
            echo "❌ 无法获取 cert 到期日 (可能 SSL 已挂)"
            echo "alert=true" >> $GITHUB_OUTPUT
            echo "reason=ssl-unreachable" >> $GITHUB_OUTPUT
            echo "days_left=0" >> $GITHUB_OUTPUT
            exit 0
          fi

          # 算剩余天数
          EXPIRY_TS=$(date -d "$EXPIRY" +%s)
          NOW_TS=$(date +%s)
          DAYS_LEFT=$(( (EXPIRY_TS - NOW_TS) / 86400 ))

          echo "Cert 到期: $EXPIRY"
          echo "剩余: $DAYS_LEFT 天"
          echo "expiry=$EXPIRY" >> $GITHUB_OUTPUT
          echo "days_left=$DAYS_LEFT" >> $GITHUB_OUTPUT

          if [ "$DAYS_LEFT" -lt 30 ]; then
            echo "⚠ 剩余 < 30 天, 触发 alert"
            echo "alert=true" >> $GITHUB_OUTPUT
            echo "reason=expiring-soon" >> $GITHUB_OUTPUT
          else
            echo "✓ 剩余充足, 无需 alert"
            echo "alert=false" >> $GITHUB_OUTPUT
          fi

      - name: Open issue if alert
        if: steps.probe.outputs.alert == 'true'
        uses: actions/github-script@v7
        with:
          # 告警发到私有仓 tortoise-docs, 不发本公开仓 (运维信息含 ssh/ECS/acme 命令,
          # 公开仓 issue 用户提反馈时可见 = 侦察信息暴露 + 观感差). 用 PAT 跨仓写.
          github-token: ${{ secrets.TORTOISE_WEB_TOKEN }}
          script: |
            // 告警目标 = 私有仓 (PL 看得到, 公网用户看不到)
            const TARGET_OWNER = 'wuyxp';
            const TARGET_REPO = 'tortoise-docs';
            const reason = '${{ steps.probe.outputs.reason }}';
            const days = '${{ steps.probe.outputs.days_left }}';
            const expiry = '${{ steps.probe.outputs.expiry }}';

            let title, body;
            if (reason === 'ssl-unreachable') {
              title = `🚨 源站 SSL cert 探测失败 ${new Date().toISOString().slice(0,10)}`;
              body = `cert-check 无法 openssl s_client 连【源站:443】.\n\n可能原因:\n- nginx 挂了 / SSL 配置错 / ECS 网络中断\n- **源站防护已上线**: ECS:443 只放行 ESA 回源 IP, GitHub runner 直连被挡 → 此时本探测需改到 ECS 本地 cron 或站点健康检查 (见 MEETING-2026-06-24-01)\n\nssh 进 ECS 跑:\n\`\`\`\nsystemctl status nginx\nopenssl x509 -in /etc/nginx/ssl/letsencrypt/serpilo.com/fullchain.pem -noout -enddate -ext subjectAltName\n\`\`\`\n\n如 cert 真过期, HTTP-01 重签 (无需凭证):\n\`\`\`\n~/.acme.sh/acme.sh --renew -d serpilo.com --force\n\`\`\``;
            } else {
              title = `⚠ 源站 SSL cert 即将过期 (剩 ${days} 天) ${expiry}`;
              body = `cert-check 检测到【源站】cert 剩余 **${days} 天** (到期 ${expiry}).\n\nESA 开了源站证书校验 → 源站证书过期会致回源 502 挂站. acme.sh cron 60 天自动续期, 剩 < 30 天还没续 = 可能续期失败 (HTTP-01 challenge 被 ESA 拦?).\n\nssh 进 ECS 检查:\n\`\`\`\n~/.acme.sh/acme.sh --list\ntail -50 ~/.acme.sh/acme.sh.log\ncurl -I http://serpilo.com/.well-known/acme-challenge/probe   # 看能否穿 ESA 回源\n\`\`\`\n\n手动强制续期 (HTTP-01):\n\`\`\`\n~/.acme.sh/acme.sh --renew -d serpilo.com --force\n\`\`\``;
            }

            // 防重复: 查近 7 天是否已有同类 issue
            const since = new Date(Date.now() - 7*24*60*60*1000).toISOString();
            const existing = await github.rest.issues.listForRepo({
              owner: TARGET_OWNER, repo: TARGET_REPO,
              state: 'open', labels: 'cert-alert', since: since,
            });
            if (existing.data.length > 0) {
              console.log(`Existing #${existing.data[0].number}, comment`);
              await github.rest.issues.createComment({
                owner: TARGET_OWNER, repo: TARGET_REPO,
                issue_number: existing.data[0].number, body: body,
              });
            } else {
              await github.rest.issues.create({
                owner: TARGET_OWNER, repo: TARGET_REPO,
                title: title, body: body, labels: ['cert-alert', 'auto-generated'],
              });
            }
