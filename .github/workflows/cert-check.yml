name: SSL cert expiry check

# 议题: MEETING-2026-05-11-06-docs-isolation Phase B (P0-2)
#       MEETING-2026-06-24/25: 探 serpilo.com 公网(ESA 边缘) — 方案B 关了源站证书校验,
#       源站证书已换 10 年自签、不再相关; 此处监控的是【ESA 边缘证书 + 站点可达性】.
# Weekly cron — openssl s_client 探 serpilo.com:443 (ESA 边缘) 解析 cert 到期日, <30 天或探测失败自动开 Issue.
#   - 探不通 = 站点 HTTPS 挂 (边缘/回源/源站任一断) → 告警.
#   - 边缘证书由 ESA 自动续期 (过期前 30 天), 正常永不触发到期告警; 若 ESA 续期异常则兜底.
#   - 走 ESA 公网, 不直连源站 → 源站防护(H)锁了 ECS 也不受影响.

on:
  schedule:
    - cron: '0 8 * * 1'  # 每周一 08:00 UTC (北京 16:00)
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check:
    name: Check cert expiry
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Probe cert + parse expiry
        id: probe
        run: |
          set -e
          DOMAIN="serpilo.com"   # 探 ESA 边缘 (公网), 监控边缘证书+站点可达; 源站防护后仍可用

          # openssl s_client 连 serpilo.com:443 (ESA 边缘) 拉 cert 链, openssl x509 解 enddate
          EXPIRY=$(echo | openssl s_client -servername "$DOMAIN" -connect "$DOMAIN:443" 2>/dev/null \
            | openssl x509 -noout -enddate 2>/dev/null \
            | cut -d= -f2)

          if [ -z "$EXPIRY" ]; then
            echo "❌ 无法获取 cert 到期日 (可能 SSL 已挂)"
            echo "alert=true" >> $GITHUB_OUTPUT
            echo "reason=ssl-unreachable" >> $GITHUB_OUTPUT
            echo "days_left=0" >> $GITHUB_OUTPUT
            exit 0
          fi

          # 算剩余天数
          EXPIRY_TS=$(date -d "$EXPIRY" +%s)
          NOW_TS=$(date +%s)
          DAYS_LEFT=$(( (EXPIRY_TS - NOW_TS) / 86400 ))

          echo "Cert 到期: $EXPIRY"
          echo "剩余: $DAYS_LEFT 天"
          echo "expiry=$EXPIRY" >> $GITHUB_OUTPUT
          echo "days_left=$DAYS_LEFT" >> $GITHUB_OUTPUT

          if [ "$DAYS_LEFT" -lt 30 ]; then
            echo "⚠ 剩余 < 30 天, 触发 alert"
            echo "alert=true" >> $GITHUB_OUTPUT
            echo "reason=expiring-soon" >> $GITHUB_OUTPUT
          else
            echo "✓ 剩余充足, 无需 alert"
            echo "alert=false" >> $GITHUB_OUTPUT
          fi

      - name: Open issue if alert
        if: steps.probe.outputs.alert == 'true'
        uses: actions/github-script@v7
        with:
          # 告警发到私有仓 tortoise-docs, 不发本公开仓 (运维信息含 ssh/ECS/acme 命令,
          # 公开仓 issue 用户提反馈时可见 = 侦察信息暴露 + 观感差). 用 PAT 跨仓写.
          github-token: ${{ secrets.TORTOISE_WEB_TOKEN }}
          script: |
            // 告警目标 = 私有仓 (PL 看得到, 公网用户看不到)
            const TARGET_OWNER = 'wuyxp';
            const TARGET_REPO = 'tortoise-docs';
            const reason = '${{ steps.probe.outputs.reason }}';
            const days = '${{ steps.probe.outputs.days_left }}';
            const expiry = '${{ steps.probe.outputs.expiry }}';

            let title, body;
            if (reason === 'ssl-unreachable') {
              title = `🚨 serpilo.com HTTPS 探测失败 ${new Date().toISOString().slice(0,10)}`;
              body = `cert-check 无法 openssl s_client 连 serpilo.com:443 (ESA 边缘).\n\n= 站点 HTTPS 挂了. 排查链路:\n- ESA 边缘是否正常 (ESA 控制台站点状态 / 边缘证书是否生效)\n- 回源是否通: \`curl -I https://serpilo.com/\` 看是否 502 (回源断) 或超时\n- 源站 nginx: ssh ECS \`systemctl status nginx\`\n- 源站防护若刚配错可能把 ESA 回源也挡了 → 核对安全组放行的回源 IP 段\n\n方案B 备注: 源站证书是 10 年自签、与此无关; 这里探的是边缘+站点可达.`;
            } else {
              title = `⚠ serpilo.com 边缘证书即将过期 (剩 ${days} 天) ${expiry}`;
              body = `cert-check 检测到 serpilo.com (ESA 边缘) 证书剩余 **${days} 天** (到期 ${expiry}).\n\nESA 免费边缘证书本应在过期前 30 天自动续期. 剩 < 30 天 = ESA 边缘证书续期可能异常.\n\n去 ESA 控制台 → SSL/TLS → 边缘证书, 看免费证书状态; 必要时手动重新申请/续期.\n\n(源站那张是 10 年自签, 不在此监控范围.)`;
            }

            // 防重复: 查近 7 天是否已有同类 issue
            const since = new Date(Date.now() - 7*24*60*60*1000).toISOString();
            const existing = await github.rest.issues.listForRepo({
              owner: TARGET_OWNER, repo: TARGET_REPO,
              state: 'open', labels: 'cert-alert', since: since,
            });
            if (existing.data.length > 0) {
              console.log(`Existing #${existing.data[0].number}, comment`);
              await github.rest.issues.createComment({
                owner: TARGET_OWNER, repo: TARGET_REPO,
                issue_number: existing.data[0].number, body: body,
              });
            } else {
              await github.rest.issues.create({
                owner: TARGET_OWNER, repo: TARGET_REPO,
                title: title, body: body, labels: ['cert-alert', 'auto-generated'],
              });
            }
