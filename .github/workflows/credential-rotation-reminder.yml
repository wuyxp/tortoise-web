name: Credential rotation reminder

# 议题: MEETING-2026-05-11-06-docs-isolation Phase B (P3-7)
# 月度 cron — 检查凭证创建日期距今, 临近寿命自动开 Issue 提醒 PL 轮换
# 凭证清单从仓库变量 vars.CREDENTIALS_INVENTORY 读 (本仓是 PUBLIC, 清单含凭证名/
# 轮换步骤/PAT scope = 侦察信息, 不放 committed 文件 + 注释; 仅 repo 管理员可见变量).
# 告警 issue 发到私有仓 tortoise-docs, 不发本公开仓.

on:
  schedule:
    - cron: '0 8 1 * *'  # 每月 1 号 08:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check:
    name: Check credential age
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Compute credential age + alert
        uses: actions/github-script@v7
        env:
          # 凭证清单从仓库变量读 (不再用公开仓 committed 文件 — 那等于把凭证清单+轮换步骤
          # +PAT scope 公网可读). 变量对公网不可见, 仅 repo 管理员可见. PL 轮换后改此变量.
          CREDENTIALS_INVENTORY: ${{ vars.CREDENTIALS_INVENTORY }}
        with:
          # 凭证轮换提醒发到私有仓 tortoise-docs, 不发本公开仓 (issue body 列凭证清单 +
          # 轮换步骤 = 侦察信息, 公网用户不该看到). 用 PAT 跨仓写.
          github-token: ${{ secrets.TORTOISE_WEB_TOKEN }}
          script: |
            // 告警目标 = 私有仓
            const TARGET_OWNER = 'wuyxp';
            const TARGET_REPO = 'tortoise-docs';

            const raw = process.env.CREDENTIALS_INVENTORY;
            if (!raw || !raw.trim()) {
              console.log('No CREDENTIALS_INVENTORY var, skip');
              return;
            }

            const inv = JSON.parse(raw);
            const now = Date.now();
            const expiringSoon = [];

            for (const cred of inv.credentials || []) {
              const created = new Date(cred.created_at).getTime();
              const days = Math.floor((now - created) / (24*60*60*1000));
              const lifeDays = cred.life_days || 365;
              const remaining = lifeDays - days;
              console.log(`${cred.name}: ${days} 天前创建, 还剩 ${remaining} 天`);
              if (remaining < 35) {  // 提前 35 天提醒
                expiringSoon.push({...cred, age_days: days, remaining_days: remaining});
              }
            }

            if (expiringSoon.length === 0) {
              console.log('✓ 无即将过期凭证');
              return;
            }

            const lines = expiringSoon.map(c =>
              `- **${c.name}** — 剩余 ${c.remaining_days} 天 (创建于 ${c.created_at}, 寿命 ${c.life_days || 365} 天)\n  - 用途: ${c.purpose}\n  - 轮换: ${c.rotation_steps}`
            ).join('\n\n');

            const title = `🔑 ${expiringSoon.length} 凭证即将过期 (轮换提醒)`;
            const body = `每月 cron 检测到以下凭证 < 35 天就要过期, 提前轮换防生产挂.\n\n${lines}\n\n## 通用步骤\n\n1. 在源系统 (阿里云 RAM / GitHub) 生新凭证\n2. 更新 GitHub Secret 输入框 (旧值会被覆盖)\n3. 验证 (跑一次相关 workflow)\n4. 删旧凭证\n5. 更新仓库变量 CREDENTIALS_INVENTORY (Settings → Variables → Actions) 的 created_at 为今天\n6. 关本 issue`;

            const since = new Date(Date.now() - 30*24*60*60*1000).toISOString();
            const existing = await github.rest.issues.listForRepo({
              owner: TARGET_OWNER, repo: TARGET_REPO,
              state: 'open', labels: 'credential-rotation', since: since,
            });
            if (existing.data.length > 0) {
              await github.rest.issues.createComment({
                owner: TARGET_OWNER, repo: TARGET_REPO,
                issue_number: existing.data[0].number, body: body,
              });
            } else {
              await github.rest.issues.create({
                owner: TARGET_OWNER, repo: TARGET_REPO,
                title: title, body: body,
                labels: ['credential-rotation', 'auto-generated'],
              });
            }
