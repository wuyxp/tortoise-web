name: "Deploy (dual GitHub Pages + Aliyun nginx)"

# 架构: tortoise-web (PUBLIC) checkout wuyxp/tortoise-docs (PRIVATE staging)
#       └─ tortoise-docs 由主仓 scripts/sync-public-docs.sh 同步 docs/public/ 子集
# MEETING-2026-05-15-04: tortoise-docs 已改为 PRIVATE，checkout 须用 TORTOISE_WEB_TOKEN PAT
# 双发: 国外用户走 GitHub Pages, 国内用户走阿里云 nginx (任一失败不阻塞另一边)

on:
  push:
    branches: [main]
  workflow_dispatch:
  # 主仓 docs-dispatch.yml 跑 sync 脚本 + push tortoise-docs 后触发本 workflow
  repository_dispatch:
    types: [docs-updated]

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Astro build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout tortoise-web
        uses: actions/checkout@v4

      - name: Checkout tortoise-docs (PRIVATE staging) into src/content/tortoise-source
        # MEETING-2026-05-15-04: tortoise-docs 已改为 PRIVATE，须用 PAT 鉴权
        uses: actions/checkout@v4
        with:
          repository: wuyxp/tortoise-docs
          path: src/content/tortoise-source
          ref: main
          token: ${{ secrets.TORTOISE_WEB_TOKEN }}

      - name: Verify docs content
        run: |
          test -f src/content/tortoise-source/README.md
          test -f src/content/tortoise-source/SYNC_INFO.md
          echo "✓ tortoise-docs submodule 拉到 ($(find src/content/tortoise-source -name '*.md' | wc -l) .md)"

      - name: Lint cross-repo docs links (P1-4)
        run: bash scripts/check-docs-links.sh

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build
        env:
          PUBLIC_SITE_URL: ${{ secrets.PUBLIC_SITE_URL || 'https://serpilo.com' }}
          PUBLIC_SITE_NAME: ${{ secrets.PUBLIC_SITE_NAME || 'Tortoise' }}
          PUBLIC_FEEDBACK_EMAIL: ${{ secrets.PUBLIC_FEEDBACK_EMAIL || 'tortoise@example.com' }}
          PUBLIC_PLAY_STORE_URL: ${{ secrets.PUBLIC_PLAY_STORE_URL || '#' }}
          PUBLIC_DOMESTIC_STORE_URL: ${{ secrets.PUBLIC_DOMESTIC_STORE_URL || '#' }}
          PUBLIC_GITHUB_REPO: ${{ secrets.PUBLIC_GITHUB_REPO || '#' }}
          # APK 直接下载 (MEETING-2026-05-12-02-apk-distribution)
          # 预发内测阶段默认直挂线上滚动包 latest.apk (PL 2026-06-21); 设 secret 可覆盖 (正式上架换 Play/版本化 URL)
          PUBLIC_APK_DOWNLOAD_URL: ${{ secrets.PUBLIC_APK_DOWNLOAD_URL || 'https://serpilo.com/downloads/latest.apk' }}
          PUBLIC_APK_DOWNLOAD_URL_CN: ${{ secrets.PUBLIC_APK_DOWNLOAD_URL_CN || '#' }}
          PUBLIC_APK_VERSION: ${{ secrets.PUBLIC_APK_VERSION || 'v0.0.0-pending' }}
          PUBLIC_APK_SHA256_FINGERPRINT: ${{ secrets.PUBLIC_APK_SHA256_FINGERPRINT || 'pending' }}
          PUBLIC_APK_SIZE_MB: ${{ secrets.PUBLIC_APK_SIZE_MB || '32' }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  deploy-pages:
    name: Deploy to GitHub Pages (国外用户)
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    continue-on-error: true
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4

  deploy-aliyun:
    name: Deploy to Aliyun nginx (国内用户)
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Rsync dist to Aliyun nginx (--delete, 保护 /downloads + /.well-known)
        # 注: GitHub Actions 不允许 if 条件直接访问 secrets, secret 缺失时 step fail,
        # continue-on-error: true (见 job 级) 不阻塞 deploy-pages.
        #
        # 演进史:
        # - MEETING-2026-06-06: appleboy/scp-action rm:true 会整删 target → 连带清掉
        #   release.yml 维护的 /downloads/ (APK) → 改 rm:false (overwrite-merge).
        # - MEETING-2026-06-12-08 go-live 暴露 rm:false 的代价成真: 源码删/改名的页面
        #   在服务器**残留**且公开可达 (已删的内部 02-coin-pitch 仍 200 + 泄漏内容).
        #   根治 = rsync --delete (dist 没有的旧文件即下线), 但用 --filter/--exclude
        #   **白名单式保护**外部进程维护的目录, 不重蹈 rm:true 误删 /downloads 覆辙:
        #     · /downloads/    — release.yml rsync 的 APK (latest.apk/version.json/txt)
        #     · /.well-known/  — ECS 上 acme.sh SSL 续期的 challenge (cert-check.yml)
        env:
          ALIYUN_HOST: ${{ secrets.ALIYUN_HOST }}
          ALIYUN_SSH_USER: ${{ secrets.ALIYUN_SSH_USER }}
          ALIYUN_SSH_KEY: ${{ secrets.ALIYUN_SSH_KEY }}
          ALIYUN_DEPLOY_PATH: ${{ secrets.ALIYUN_DEPLOY_PATH }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$ALIYUN_SSH_KEY" > ~/.ssh/aliyun_key
          chmod 600 ~/.ssh/aliyun_key
          ssh-keyscan -H "$ALIYUN_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          # --filter='protect ...' 双保险: 即使排除规则边界出错, --delete 也绝不碰这两个外部目录
          rsync -rltzv --delete \
            --filter='protect /downloads/' \
            --filter='protect /.well-known/' \
            --exclude='/downloads/' \
            --exclude='/.well-known/' \
            -e "ssh -i ~/.ssh/aliyun_key -o StrictHostKeyChecking=accept-new" \
            dist/ "$ALIYUN_SSH_USER@$ALIYUN_HOST:${ALIYUN_DEPLOY_PATH%/}/"
