name: "Deploy (dual GitHub Pages + Aliyun nginx)"

# 议题: MEETING-2026-05-11-05-static-website-v1
# 双发: 国外用户走 GitHub Pages (Cloudflare 前置可选), 国内用户走阿里云 nginx
# 任一失败不阻塞另一边 (continue-on-error + 独立 job)

on:
  # ⚠ PAUSED: MEETING-2026-05-11-06-docs-isolation 决议 PL 暂停 deploy 直到
  # B 方案 (独立 tortoise-docs 公仓) 实施完成. push + repository_dispatch 触发
  # 已删除, 防意外推送把主仓 PRIVATE 内容暴露公网.
  # 等 sync-public-docs.sh 接通 + 验证后恢复 push: 与 repository_dispatch:.
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Astro build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout tortoise-web
        uses: actions/checkout@v4

      - name: Download Tortoise main repo docs (codeload tarball, anonymous)
        # 不用 git submodule / git clone — actions/checkout 注入的 GITHUB_TOKEN
        # extraheader/insteadOf rewrite 无法可靠清除, 致跨仓 git fail.
        # 改用 codeload tarball HTTP 下载 — 0 git 操作, public 仓 100% 匿名可访问.
        run: |
          rm -rf src/content/tortoise-source
          mkdir -p src/content/tortoise-source
          curl -sSL --fail \
            https://codeload.github.com/wuyxp/kotlin-stop-shortTV/tar.gz/refs/heads/main \
            -o /tmp/tortoise-main.tar.gz
          tar xzf /tmp/tortoise-main.tar.gz -C /tmp
          # tarball 解压后是 kotlin-stop-shortTV-main/, 把内容移到目标位置
          shopt -s dotglob
          mv /tmp/kotlin-stop-shortTV-main/* src/content/tortoise-source/
          rm -rf /tmp/tortoise-main.tar.gz /tmp/kotlin-stop-shortTV-main
          # 抽样验证
          test -f src/content/tortoise-source/docs/README.md
          echo "✓ Tortoise docs/ tarball 已就位 ($(find src/content/tortoise-source/docs -name '*.md' | wc -l) .md 文件)"

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build
        env:
          PUBLIC_SITE_URL: ${{ secrets.PUBLIC_SITE_URL || 'https://serpilo.com' }}
          PUBLIC_SITE_NAME: ${{ secrets.PUBLIC_SITE_NAME || 'Tortoise' }}
          PUBLIC_FEEDBACK_EMAIL: ${{ secrets.PUBLIC_FEEDBACK_EMAIL || 'tortoise@example.com' }}
          PUBLIC_PLAY_STORE_URL: ${{ secrets.PUBLIC_PLAY_STORE_URL || '#' }}
          PUBLIC_DOMESTIC_STORE_URL: ${{ secrets.PUBLIC_DOMESTIC_STORE_URL || '#' }}
          PUBLIC_GITHUB_REPO: ${{ secrets.PUBLIC_GITHUB_REPO || 'https://github.com/wuyxp/kotlin-stop-shortTV' }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  deploy-pages:
    name: Deploy to GitHub Pages (国外用户)
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    continue-on-error: true
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4

  deploy-aliyun:
    name: Deploy to Aliyun nginx (国内用户)
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Rsync dist to Aliyun nginx
        # 注: GitHub Actions 不允许 if 条件直接访问 secrets (security 限制).
        # secret 缺失时 step 会 fail, continue-on-error: true 不阻塞 deploy-pages.
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.ALIYUN_HOST }}
          username: ${{ secrets.ALIYUN_SSH_USER }}
          key: ${{ secrets.ALIYUN_SSH_KEY }}
          source: "dist/*"
          target: ${{ secrets.ALIYUN_DEPLOY_PATH }}
          strip_components: 1
          rm: true
